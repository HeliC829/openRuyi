[package]
edition = "2021"
name = "tachyonfx"
version = "0.25.0"
authors = ["Adrian Papari <junkdog@angelhill.net>"]
build = false
exclude = [
    "images/*.gif",
    "docs/assets/*.gif",
    ".*",
    "scripts/*",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A ratatui library for creating shader-like effects in TUIs."
homepage = "https://github.com/ratatui/tachyonfx"
documentation = "https://docs.rs/tachyonfx"
readme = "README.md"
keywords = [
    "ratatui",
    "terminal",
    "effects",
    "UI",
    "TUI",
]
categories = ["command-line-interface"]
license = "MIT"
repository = "https://github.com/ratatui/tachyonfx"

[package.metadata.docs.rs]
rustdoc-args = [
    "--html-in-header",
    "docs-assets/doc-header.html",
]

[features]
default = [
    "std",
    "dsl",
]
dsl = ["dep:anpa"]
sendable = []
std = [
    "bon/std",
    "compact_str/std",
    "thiserror/std",
    "ratatui-core/std",
]
std-duration = ["std"]
wasm = ["dep:web-time"]
web-time = ["wasm"]

[lib]
name = "tachyonfx"
path = "src/lib.rs"

