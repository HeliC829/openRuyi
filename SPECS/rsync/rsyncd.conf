# /etc/rsyncd.conf
# Default configuration for the rsync daemon.
# See rsyncd.conf(5) man page for all available options.

# PID file location.
pid file = /run/rsyncd.pid

# Log file location.
log file = /var/log/rsyncd.log

# Run transfers as this user/group. 'nobody' is a safe default.
uid = nobody
gid = nobody

# Controls chrooting to the module path. 'no' is easier for initial setup,
# but 'yes' is strongly recommended for better security in production.
use chroot = no

# Default to read-only for all modules. This is a critical security setting.
# To allow uploads, you must set 'read only = false' within a module's definition.
read only = yes

# Limit the number of concurrent connections to prevent resource exhaustion.
max connections = 4

# Enable per-file transfer logging.
transfer logging = true


# --- Module Definitions ---
# No modules are enabled by default. Uncomment and customize the example below.

# [module_name]
#     # Path to the directory to be shared.
#     path = /srv/rsync/public_data
#
#     # A descriptive comment for the module.
#     comment = Public Data Archive
#
#     # Uncomment the line below to allow clients to write to this module.
#     # read only = false
#
#     # Uncomment to restrict access to specific clients.
#     # hosts allow = 192.168.1.0/24
#     # hosts deny = *
#
#     # Uncomment for password authentication.
#     # auth users = your_user
#     # secrets file = /etc/rsyncd.secrets
